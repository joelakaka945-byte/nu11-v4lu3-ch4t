<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nu11-v4lu3-ch4t</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#050507;color:#e8e8e8;font-family:ui-monospace,Menlo,monospace;overflow:hidden}
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:10px}
 .grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 80%);pointer-events:none}
 .scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.03) 0 1px,transparent 1px 3px);pointer-events:none;opacity:0.3}
 .glow{ text-shadow:0 0 12px rgba(0,255,136,0.8),0 0 30px rgba(0,255,136,0.3)}
 .glow-box{box-shadow:0 0 20px rgba(0,255,136,0.15), inset 0 0 20px rgba(0,255,136,0.05)}
  @keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px,0)}80%{transform:translate(1px,1px)}100%{transform:translate(0)}}
 .glitch:hover{animation:glitch 0.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
  button{cursor:pointer;font-family:inherit;transition:0.15s}
  input{font-family:inherit;outline:none}
  #void{position:fixed;inset:0;pointer-events:none;opacity:0.5}
</style>
</head>
<body>
<canvas id="void"></canvas>
<div class="grid"></div>
<div class="scanlines"></div>
<div id="app"></div>
<script>
const LS_U='nu11_users', LS_S='nu11_sess', LS_F='nu11_f_', LS_B='nu11_b_', LS_M='nu11_m_', LS_BURN='nu11_burn_';
const BC = new BroadcastChannel('nu11_void_v4');
let peer=null, conns={}, presence={}, peerId=null;

function loadUsers(){try{let r=localStorage.getItem(LS_U);let u=r?JSON.parse(r):[];if(!u.find(x=>x.u==='demo')){u=[{u:'demo',p:btoa('demo123')},...u];localStorage.setItem(LS_U,JSON.stringify(u))}return u}catch{return [{u:'demo',p:btoa('demo123')}]}}
function saveUsers(u){localStorage.setItem(LS_U,JSON.stringify(u))}
function getSess(){try{return JSON.parse(localStorage.getItem(LS_S))}catch{return null}}
function setSess(o){localStorage.setItem(LS_S,JSON.stringify(o))}
function chatId(a,b){return [a,b].sort().join('__')}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function time(t){return new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function getFriends(){try{return JSON.parse(localStorage.getItem(LS_F+state.user)||'[]')}catch{return[]}}
function getBlocked(){try{return JSON.parse(localStorage.getItem(LS_B+state.user)||'[]')}catch{return[]}}
function getMsgs(id){try{return JSON.parse(localStorage.getItem(LS_M+id)||'[]')}catch{return[]}}
function setMsgs(id,m){localStorage.setItem(LS_M+id,JSON.stringify(m))}
function getBurn(){try{return JSON.parse(localStorage.getItem(LS_BURN+state.user)||'{}')}catch{return{}}}

let users=loadUsers();
let sess=getSess();
let state={user:sess && users.find(x=>x.u===sess.u)?sess.u:null, mode:'create', search:'', active:null, msg:'', err:'', formU:'', formP:'', scanning:false, voidFound:[]};

// particles
const canvas=document.getElementById('void'), ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight} resize(); addEventListener('resize',resize);
let dots=Array.from({length:80},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.5+0.2}));
(function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);dots.forEach(d=>{d.x+=d.vx;d.y+=d.vy;if(d.x<0||d.x>canvas.width)d.vx*=-1;if(d.y<0||d.y>canvas.height)d.vy*=-1;ctx.fillStyle='rgba(0,255,136,0.4)';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(anim)})();

function initPeer(){
  if(peer) try{peer.destroy()}catch{}
  peerId='nu11_'+state.user;
  try{
    peer=new Peer(peerId);
    peer.on('open',id=>{console.log('peer open',id); broadcastPresence()});
    peer.on('connection',c=>{ setupConn(c) });
    peer.on('error',e=>{
      if(e.type==='unavailable-id'){
        peer=new Peer(peerId+'_'+Math.floor(Math.random()*9999));
        peer.on('open',()=>broadcastPresence());
        peer.on('connection',c=>setupConn(c));
      }
    });
  }catch(e){console.log('peer fail',e)}
}

function setupConn(conn){
  const remote = conn.peer.replace(/^nu11_/,'').split('_')[0];
  conns[remote]=conn;
  conn.on('open',()=>{ addFriendSilent(remote); render(); });
  conn.on('data',data=>{
    if(data.type==='msg'){
      const id=chatId(state.user, data.from);
      let msgs=getMsgs(id); msgs.push(data.msg); setMsgs(id,msgs);
      if(state.active===data.from) renderMessages();
      else render();
    }
    if(data.type==='presence'){ presence[data.from]={ts:Date.now(), peer:data.peerId}; updateVoidList(); }
  });
  conn.on('close',()=>{ delete conns[remote] });
}

function broadcastPresence(){
  const payload={type:'presence', from:state.user, peerId:peerId, ts:Date.now()};
  BC.postMessage(payload);
  presence[state.user]={ts:Date.now(), peer:peerId};
  Object.values(conns).forEach(c=>{ try{c.send(payload)}catch{} });
}

BC.onmessage=e=>{
  const d=e.data;
  if(!d || d.from===state.user) return;
  if(d.type==='presence'){ presence[d.from]={ts:Date.now(), peer:d.peerId}; if(state.scanning) updateVoidList(); }
  if(d.type==='msg'){
    const id=chatId(state.user,d.from);
    let msgs=getMsgs(id); msgs.push(d.msg); setMsgs(id,msgs);
    if(state.active===d.from) renderMessages(); else render();
  }
  if(d.type==='scan_req' && state.user){ BC.postMessage({type:'presence', from:state.user, peerId:peerId, ts:Date.now()}) }
}

setInterval(()=>{
  if(!state.user) return;
  const now=Date.now();
  Object.keys(presence).forEach(k=>{ if(now-presence[k].ts>25000) delete presence[k] });
  if(state.user) broadcastPresence();
  if(state.scanning) updateVoidList();
},3000);

function addFriendSilent(name){
  let f=getFriends(); if(!f.includes(name)){ f.push(name); localStorage.setItem(LS_F+state.user, JSON.stringify(f)) }
}

function updateVoidList(){
  const now=Date.now();
  const list=Object.keys(presence).filter(k=>k!==state.user && now-presence[k].ts<20000);
  state.voidFound=list;
  const el=document.getElementById('voidList');
  if(el){
    el.innerHTML = list.length? list.map(u=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid #00ff8822;background:rgba(0,255,136,0.06);border-radius:10px;margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center"><div style="width:8px;height:8px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 1s infinite"></div><span style="font-size:12px">@${u}</span><span style="font-size:9px;color:#00ff88;border:1px solid #00ff8822;padding:2px 6px;border-radius:20px">VOID • WIFI</span></div>
        <button onclick="connectAndChat('${u}')" style="padding:6px 10px;border-radius:20px;background:#00ff88;color:#000;font-weight:800;font-size:11px;border:0">CONNECT</button>
      </div>
    `).join('') : `<div style="padding:12px;text-align:center;color:#555;font-size:11px">scanning void... no other tab found yet.<br>Open this site on another phone on same WiFi and click SCAN again.</div>`;
  }
}

window.connectAndChat=function(name){
  if(peer && presence[name]){
    try{
      const targetId = presence[name].peer || 'nu11_'+name;
      const c = peer.connect(targetId);
      c.on('open',()=>{ setupConn(c); state.active=name; addFriendSilent(name); render(); });
      c.on('error',()=>{ state.active=name; addFriendSilent(name); render(); });
    }catch{ state.active=name; addFriendSilent(name); render(); }
  }else{
    state.active=name; addFriendSilent(name); render();
  }
}

function renderMessages(){
  const activeId=state.user&&state.active?chatId(state.user,state.active):'';
  const activeMsgs=activeId?getMsgs(activeId):[];
  const el=document.getElementById('msgs');
  if(!el) return;
  const burn=getBurn();
  el.innerHTML = activeMsgs.length? activeMsgs.map(m=>{
    const mine=m.from===state.user;
    return `<div style="display:flex;justify-content:${mine?'flex-end':'flex-start'}"><div style="max-width:66%;padding:10px 12px;border-radius:14px;font-size:13px;line-height:1.4;background:${mine?'#fff':'#111'};color:${mine?'#000':'#eee'};border:1px solid ${mine?'#fff':'#222'};box-shadow:${mine?'0 0 15px rgba(255,255,255,0.2)':'0 0 15px rgba(0,255,136,0.1)'};border-bottom-right-radius:${mine?'4px':'14px'};border-bottom-left-radius:${mine?'14px':'4px'}"><div>${esc(m.text)}</div><div style="margin-top:4px;font-size:9px;opacity:0.6;display:flex;gap:6px">${time(m.ts)} ${mine?'✓✓':''} ${burn[state.active]?'🔥':''}</div></div></div>`
  }).join('') : `<div style="text-align:center;padding:50px 0;color:#555;font-size:11px"><div style="display:inline-block;border:1px dashed #222;padding:6px 10px;border-radius:20px">∅ no signal yet with @${state.active}</div><div style="margin-top:10px">say something, it will appear on their screen live if they scanned you</div></div>`;
  el.scrollTop=el.scrollHeight;
}

function render(){
  if(!state.user){
    document.getElementById('app').innerHTML=`
      <div style="min-height:100vh;display:grid;place-items:center;padding:20px;position:relative;z-index:2">
        <div style="width:100%;max-width:400px;border:1px solid #1a1a1a;background:rgba(10,10,10,0.9);backdrop-filter:blur(12px);border-radius:20px;overflow:hidden" class="glow-box">
          <div style="padding:24px 22px 16px;border-bottom:1px solid #151515">
            <div style="font-weight:900;letter-spacing:0.25em;font-size:18px" class="glow glitch">nu11-v4lu3-ch4t</div>
            <div style="font-size:10px;color:#666;margin-top:6px;letter-spacing:0.2em">VOID PROTOCOL • NO LOGS • P2P • BURN</div>
            <div style="margin-top:12px;height:2px;background:linear-gradient(90deg,#00ff88,transparent);box-shadow:0 0 10px #00ff88"></div>
          </div>
          <div style="padding:16px;display:flex;gap:8px">
            <button onclick="state.mode='create';render()" style="flex:1;padding:11px;border-radius:12px;border:1px solid ${state.mode==='create'?'#00ff88':'#222'};background:${state.mode==='create'?'#00ff88':'#000'};color:${state.mode==='create'?'#000':'#666'};font-weight:800;font-size:12px;box-shadow:${state.mode==='create'?'0 0 15px #00ff8844':''}">CREATE</button>
            <button onclick="state.mode='login';render()" style="flex:1;padding:11px;border-radius:12px;border:1px solid ${state.mode==='login'?'#fff':'#222'};background:${state.mode==='login'?'#fff':'#000'};color:${state.mode==='login'?'#000':'#666'};font-weight:800;font-size:12px">LOGIN</button>
          </div>
          <div style="padding:0 18px 18px;display:flex;flex-direction:column;gap:12px">
            <input id="u" placeholder="username" style="width:100%;background:#000;border:1px solid #222;border-radius:12px;padding:13px 14px;color:#fff;font-size:13px" value="${state.formU}">
            <input id="p" type="password" placeholder="password" style="width:100%;background:#000;border:1px solid #222;border-radius:12px;padding:13px 14px;color:#fff;font-size:13px" value="${state.formP}">
            ${state.err?`<div style="font-size:11px;color:#ff6b6b;border:1px solid #ff6b6b22;background:rgba(255,107,107,0.08);padding:9px 10px;border-radius:10px">${state.err}</div>`:''}
            <button onclick="doAuth()" style="width:100%;padding:13px;border-radius:12px;background:#fff;color:#000;font-weight:900;letter-spacing:0.1em;border:0;box-shadow:0 0 20px rgba(255,255,255,0.2)">ENTER VOID</button>
            <div style="font-size:10px;color:#444;line-height:1.5">demo: <b style="color:#666">demo / demo123</b> • stays logged in • messages live in browser</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const friends=getFriends(), blocked=getBlocked(), burn=getBurn();
  const filtered = state.search.trim()? users.filter(u=>u.u!==state.user && u.u.includes(state.search.toLowerCase()) &&!blocked.includes(u.u)).slice(0,8) : [];

  document.getElementById('app').innerHTML=`
  <div style="display:flex;height:100vh;width:100vw;position:relative;z-index:2">
    <div style="width:68px;border-right:1px solid #151515;background:rgba(8,8,8,0.9);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:14px 0">
      <div style="display:flex;flex-direction:column;gap:14px;align-items:center">
        <div style="width:38px;height:38px;border-radius:12px;background:#00ff88;color:#000;display:grid;place-items:center;font-weight:900;box-shadow:0 0 15px #00ff8844">${state.user[0].toUpperCase()}</div>
        <div style="width:32px;height:32px;border-radius:10px;border:1px solid #00ff8822;background:rgba(0,255,136,0.08);display:grid;place-items:center;color:#00ff88" class="glow">◉</div>
      </div>
      <button onclick="logout()" style="width:32px;height:32px;border-radius:10px;border:1px solid #222;background:#000;color:#666">↩</button>
    </div>

    <div style="width:340px;min-width:340px;border-right:1px solid #151515;background:rgba(10,10,10,0.88);backdrop-filter:blur(14px);display:flex;flex-direction:column">
      <div style="padding:16px;border-bottom:1px solid #151515">
        <div style="font-weight:900;font-size:13px;letter-spacing:0.2em" class="glow">nu11-v4lu3-ch4t</div>
        <div style="font-size:10px;color:#666;margin-top:4px">@${state.user} • ${friends.length} chats • peer:${peerId? '●':'○'} ${peerId||''}</div>

        <div style="margin-top:14px;border:1px solid #00ff8822;background:rgba(0,255,136,0.06);border-radius:12px;padding:10px">
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;letter-spacing:0.15em;color:#00ff88">LOCAL VOID SCAN</span><span style="font-size:9px;color:#666">${state.scanning?'SCANNING...':'IDLE'}</span></div>
          <button id="scanBtn" onclick="startScan()" style="margin-top:8px;width:100%;padding:10px;border-radius:10px;background:#00ff88;color:#000;font-weight:900;font-size:11px;letter-spacing:0.1em;border:0;box-shadow:0 0 15px #00ff8844">⚡ SCAN WIFI VOID</button>
          <div id="voidList" style="margin-top:10px"></div>
          <div style="font-size:9px;color:#555;margin-top:8px;line-height:1.4">Shows anyone with this site open on same WiFi / same browser. Click CONNECT to P2P chat. No server stores it.</div>
        </div>

        <div style="margin-top:12px;position:relative">
          <input id="searchInput" placeholder="search username to add..." style="width:100%;background:#000;border:1px solid #222;border-radius:12px;padding:11px 12px 11px 34px;color:#fff;font-size:12px" value="${state.search}">
          <span style="position:absolute;left:11px;top:11px;color:#555">⌕</span>
        </div>
      </div>

      <div style="flex:1;overflow:auto">
        <div id="searchResults"></div>
        <div style="padding:10px 12px 6px;font-size:10px;letter-spacing:0.15em;color:#555">YOUR CHATS • ${friends.length}</div>
        <div id="friendsList">
          ${friends.length===0?`<div style="padding:20px;text-align:center;color:#555;font-size:11px">∅ no chats<br>search + add or scan void</div>`:
            friends.map(f=>{
              const id=chatId(state.user,f);
              const msgs=getMsgs(id);
              const last=msgs[msgs.length-1];
              const active=state.active===f;
              const online=presence[f] && Date.now()-presence[f].ts<15000;
              return `<div onclick="openChat('${f}')" style="padding:12px;display:flex;gap:10px;cursor:pointer;background:${active?'rgba(255,255,255,0.06)':'transparent'};border-left:${active?'2px solid #00ff88':'2px solid transparent'};transition:0.15s">
                <div style="width:34px;height:34px;border-radius:10px;background:${active?'#fff':'#151515'};color:${active?'#000':'#aaa'};display:grid;place-items:center;font-weight:700;font-size:12px;position:relative;box-shadow:${active?'0 0 10px #fff5':''}">${f[0].toUpperCase()}${online?`<span style="position:absolute;right:-3px;bottom:-3px;width:9px;height:9px;border-radius:50%;background:#00ff88;border:1px solid #000;box-shadow:0 0 8px #00ff88"></span>`:''}</div>
                <div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:${active?'700':'400'}">@${f} ${conns[f]?'• P2P':''}</span><span style="font-size:10px;color:#666">${last?time(last.ts):''}</span></div><div style="font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${last? (last.from===state.user?'you: ':'')+last.text : 'no messages yet'}</div></div>
              </div>`
            }).join('')
          }
        </div>
      </div>
      <div style="padding:8px 12px;border-top:1px solid #151515;font-size:8px;color:#333;letter-spacing:0.2em">NULL VOID PROTOCOL • BURN AFTER READ • NO LOGS</div>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;background:rgba(8,8,8,0.6);backdrop-filter:blur(8px)">
      ${!state.active?`
        <div style="flex:1;display:grid;place-items:center;text-align:center;padding:20px">
          <div><div style="display:inline-flex;align-items:center;gap:8px;border:1px solid #00ff8822;background:rgba(0,255,136,0.08);border-radius:20px;padding:7px 14px;font-size:10px;letter-spacing:0.15em;color:#00ff88" class="glow">◉ VOID LINK ESTABLISHED • ENCRYPTED</div><div style="margin-top:18px;font-size:14px;color:#aaa" class="glow">select a chat or SCAN LOCAL VOID</div><div style="margin-top:8px;font-size:11px;color:#555;max-width:320px;line-height:1.5">Tip: Open this site on your friend's phone on same WiFi, both click SCAN VOID, then CONNECT. Messages go P2P, no server saves them.</div></div>
        </div>
      `:`
        <div style="height:58px;border-bottom:1px solid #151515;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,10,10,0.9)">
          <div style="display:flex;gap:10px;align-items:center"><div style="width:34px;height:34px;border-radius:10px;background:#fff;color:#000;display:grid;place-items:center;font-weight:800;box-shadow:0 0 10px #fff5">${state.active[0].toUpperCase()}</div><div><div style="font-size:13px;font-weight:700">@${state.active} ${conns[state.active]?'• P2P LIVE':''}</div><div style="font-size:10px;color:${conns[state.active]?'#00ff88':'#666'}">${conns[state.active]?'● direct encrypted tunnel':'○ local storage mode'}</div></div></div>
          <div style="display:flex;gap:6px">
            <button onclick="toggleBurn('${state.active}')" style="padding:7px 10px;border-radius:9px;border:1px solid ${burn[state.active]?'#ff8c0022':'#222'};background:${burn[state.active]?'rgba(255,140,0,0.12)':'#000'};color:${burn[state.active]?'#ff9d2e':'#666'};font-size:11px">${burn[state.active]?'🔥 BURN ON':'🔥'}</button>
            <button onclick="clearChat('${state.active}')" style="padding:7px 10px;border-radius:9px;border:1px solid #222;background:#000;color:#666;font-size:11px">CLEAR</button>
            <button onclick="blockUser('${state.active}')" style="padding:7px 10px;border-radius:9px;border:1px solid #331a1a;background:#1a0e0e;color:#a55;font-size:11px">BLOCK</button>
          </div>
        </div>
        <div id="msgs" style="flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:10px"></div>
        ${burn[state.active]?`<div style="margin:0 12px 8px;border:1px solid #ff8c0022;background:rgba(255,140,0,0.08);color:#ffb26a;font-size:10px;padding:7px 10px;border-radius:10px">burn mode: deletes after 10s on both sides</div>`:''}
        <div style="padding:12px;border-top:1px solid #151515;background:rgba(10,10,10,0.9);display:flex;gap:8px">
          <input id="msgin" placeholder="message @${state.active}..." style="flex:1;background:#000;border:1px solid #222;border-radius:12px;padding:12px 14px;color:#fff;font-size:13px;box-shadow:inset 0 0 20px rgba(0,255,136,0.03)">
          <button onclick="sendMsg()" style="width:46px;height:46px;border-radius:12px;background:#00ff88;color:#000;border:0;display:grid;place-items:center;font-weight:900;box-shadow:0 0 15px #00ff8844">➤</button>
        </div>
      `}
    </div>
  </div>`;

  // attach listeners without full re-render
  setTimeout(()=>{
    const sInput=document.getElementById('searchInput');
    if(sInput){
      sInput.focus();
      const len=sInput.value.length;
      sInput.setSelectionRange(len,len);
      sInput.addEventListener('input', e=>{
        state.search=e.target.value;
        updateSearchDOM();
      });
    }
    updateSearchDOM();
    renderMessages();
    const mi=document.getElementById('msgin');
    if(mi){
      mi.focus();
      mi.addEventListener('input', e=>{ state.msg=e.target.value });
      mi.addEventListener('keydown', e=>{ if(e.key==='Enter') sendMsg() });
    }
    const scanBtn=document.getElementById('scanBtn');
    if(state.scanning && scanBtn){ scanBtn.textContent='SCANNING VOID...'; }
    updateVoidList();
  },0);
}

function updateSearchDOM(){
  const el=document.getElementById('searchResults');
  if(!el) return;
  const filtered = state.search.trim()? users.filter(u=>u.u!==state.user && u.u.toLowerCase().includes(state.search.toLowerCase()) &&!getBlocked().includes(u.u)).slice(0,8) : [];
  if(!state.search.trim()){ el.innerHTML=''; return; }
  el.innerHTML = `
    <div style="padding:8px 12px 6px;font-size:10px;letter-spacing:0.15em;color:#00ff88">SEARCH • ${filtered.length}</div>
    ${filtered.map(u=>`
      <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #111;background:rgba(0,255,136,0.03)">
        <div style="display:flex;gap:10px;align-items:center"><div style="width:28px;height:28px;border-radius:8px;background:#151515;display:grid;place-items:center;font-size:12px">${u.u[0].toUpperCase()}</div><div style="font-size:12px">@${u.u}</div></div>
        <button onclick="addUser('${u.u}')" style="padding:6px 10px;border-radius:20px;background:#fff;color:#000;font-size:11px;font-weight:700;border:0">+ ADD</button>
      </div>
    `).join('') || `<div style="padding:12px;color:#555;font-size:11px">no user found</div>`}
  `;
}

window.startScan=function(){
  state.scanning=true;
  BC.postMessage({type:'scan_req', from:state.user});
  broadcastPresence();
  const btn=document.getElementById('scanBtn');
  if(btn) btn.textContent='SCANNING VOID...';
  updateVoidList();
  setTimeout(()=>{ state.scanning=false; if(btn) btn.textContent='⚡ SCAN WIFI VOID'; },2500);
}

window.doAuth=function(){
  const uEl=document.getElementById('u'), pEl=document.getElementById('p');
  const u=(uEl?uEl.value:state.formU).trim().toLowerCase();
  const p=(pEl?pEl.value:state.formP);
  state.err='';
  if(!/^[a-z0-9_]{3,15}$/.test(u)){ state.err='username 3-15, only a-z 0-9 _'; render(); return; }
  if(p.length<6){ state.err='password min 6 chars'; render(); return; }
  if(state.mode==='create'){
    if(users.find(x=>x.u===u)){ state.err='username taken'; render(); return; }
    users.push({u,p:btoa(p)}); saveUsers(users);
  }else{
    const f=users.find(x=>x.u===u);
    if(!f || f.p!==btoa(p)){ state.err='wrong username or password'; render(); return; }
  }
  state.user=u; setSess({u}); initPeer(); render();
}
window.logout=function(){ try{peer&&peer.destroy()}catch{}; localStorage.removeItem(LS_S); state.user=null; state.active=null; state.search=''; render(); }
window.addUser=function(name){
  let f=getFriends(); if(!f.includes(name)){ f.push(name); localStorage.setItem(LS_F+state.user, JSON.stringify(f)) }
  state.search=''; state.active=name;
  if(peer){ try{ const c=peer.connect('nu11_'+name); c.on('open',()=>setupConn(c)); }catch{} }
  render();
}
window.openChat=function(name){ state.active=name; render(); }
window.sendMsg=function(){
  const input=document.getElementById('msgin');
  const txt=(input?input.value:state.msg).trim();
  if(!txt ||!state.active) return;
  const id=chatId(state.user, state.active);
  const msg={id:Date.now()+'', from:state.user, to:state.active, text:txt, ts:Date.now()};
  let msgs=getMsgs(id); msgs.push(msg); setMsgs(id,msgs);
  // P2P send
  if(conns[state.active] && conns[state.active].open){
    try{ conns[state.active].send({type:'msg', from:state.user, msg}); }catch{}
  } else {
    BC.postMessage({type:'msg', from:state.user, msg, to:state.active});
  }
  const burn=getBurn();
  if(burn[state.active]){
    setTimeout(()=>{ let mm=getMsgs(id); mm=mm.filter(x=>x.id!==msg.id); setMsgs(id,mm); if(state.active) renderMessages(); },10000);
  }
  state.msg=''; if(input) input.value=''; renderMessages();
  if(state.active==='demo' &&!conns['demo']){
    setTimeout(()=>{
      const replies=["ack.","null.","received.","void confirmed.","stay private.","onion routed.","∅"];
      const r={id:Date.now()+'r', from:'demo', to:state.user, text:replies[Math.floor(Math.random()*replies.length)], ts:Date.now()};
      let cur=getMsgs(id); cur.push(r); setMsgs(id,cur); renderMessages();
    },600);
  }
}
window.clearChat=function(name){ if(!confirm('clear @'+name+'?')) return; localStorage.removeItem(LS_M+chatId(state.user,name)); renderMessages(); }
window.blockUser=function(name){
  if(!confirm('block @'+name+'?')) return;
  let b=getBlocked(); if(!b.includes(name)){ b.push(name); localStorage.setItem(LS_B+state.user, JSON.stringify(b)); }
  let f=getFriends(); f=f.filter(x=>x!==name); localStorage.setItem(LS_F+state.user, JSON.stringify(f));
  localStorage.removeItem(LS_M+chatId(state.user,name));
  state.active=null; render();
}
window.toggleBurn=function(name){ const br=getBurn(); br[name]=!br[name]; localStorage.setItem(LS_BURN+state.user, JSON.stringify(br)); render(); }

if(state.user) initPeer();
render();
</script>
</body>
</html>
